name: CloudBot Continuous Integration & Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Robot Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        tags: cloudbot:latest
        outputs: type=docker,dest=/tmp/cloudbot.tar

    - name: Verify Image Compilation
      run: |
        docker load --input /tmp/cloudbot.tar
        docker run --rm cloudbot:latest /bin/bash -c "source /opt/ros/jazzy/setup.bash && source ros2_ws/install/setup.bash && ros2 pkg list | grep cloudbot_core"

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to Remote Linux Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          mkdir -p ~/projects
          cd ~/projects
          if [ ! -d "cloudbot" ]; then
            git clone https://github.com/${{ github.repository }}.git cloudbot
          fi
          cd cloudbot
          git pull origin main
          docker compose down
          docker compose up --build -d